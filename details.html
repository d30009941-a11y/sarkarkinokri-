<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Job Details</title><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<link rel="stylesheet" href="detailstyle.css"></head><body><div class="container"><div id="loader">
<div class="spinner"></div>
<p>Loading Job Details...</p>
</div><div id="main-content" style="display:none;"></div></div><script>

/* =============================
   GET JOB ID FROM URL
============================= */

const urlParams = new URLSearchParams(window.location.search);
const jobId = urlParams.get('id');
const detailedInfoURL = `${jobId}.html`;

/* =============================
   STATIC HTML PRIORITY
============================= */

if(jobId){

fetch(detailedInfoURL,{method:'HEAD'})
.then(res=>{
if(res.ok) window.location.replace(detailedInfoURL);
else loadJsonData(jobId);
})
.catch(()=>loadJsonData(jobId));

}

/* =============================
   UNIVERSAL JOB LOADER
============================= */

async function loadJsonData(id){

try{

/* 1️⃣ TRY MASTER JSON */

const masterRes = await fetch('data/jobsdata.json');

if(masterRes.ok){

const masterData = await masterRes.json();

/* OBJECT STRUCTURE */

if(masterData[id]){
renderEngine(masterData[id]);
return;
}

/* ARRAY STRUCTURE */

if(Array.isArray(masterData)){
const job = masterData.find(j => j.id === id || j.master === id);
if(job){
renderEngine(job);
return;
}
}

}

/* 2️⃣ TRY MULTI FILE INDEX */

const indexRes = await fetch('data/jobs-index.json');

if(indexRes.ok){

const files = await indexRes.json();

for(const file of files){

const res = await fetch(`data/jobsdata/${file}`);

if(!res.ok) continue;

const data = await res.json();

/* OBJECT */

if(data[id]){
renderEngine(data[id]);
return;
}

/* ARRAY */

if(Array.isArray(data)){
const job = data.find(j => j.id === id || j.master === id);
if(job){
renderEngine(job);
return;
}
}

}

}

/* 3️⃣ FALLBACK */

loadFallback(id);

}catch(e){

console.error("Job load error",e);
loadFallback(id);

}

}

/* =============================
   RENDER ENGINE
============================= */

function renderEngine(data){

document.getElementById('loader').style.display='none';

const content=document.getElementById('main-content');
content.style.display='block';

/* HEADER */

const header=document.createElement('div');
header.className='job-header';

header.innerHTML=`

<h1>${data.overview.post_name || data.overview.category}</h1>

<div class="meta-pills">
<span class="pill"><i class="fas fa-university"></i> ${data.overview.recruitment_body}</span>
<span class="pill"><i class="fas fa-file-alt"></i> ${data.overview.notification_number}</span>
</div>

`;

content.appendChild(header);

/* IMPORTANT DATES */

if(data.important_dates){

const sec=document.createElement('div');
sec.className='section-box';

sec.innerHTML=`

<div class="section-title">
<i class="fas fa-calendar-alt"></i> Important Dates
</div>

<div class="generic-grid">

${Object.entries(data.important_dates).map(([k,v])=>
`<div class="grid-card"><label>${k}</label><span>${v}</span></div>`
).join('')}

</div>
`;

content.appendChild(sec);

}

/* APPLICATION FEE */

if(data.application_fee){

const sec=document.createElement('div');
sec.className='section-box';

sec.innerHTML=`

<div class="section-title">
<i class="fas fa-rupee-sign"></i> Application Fee
</div>

<div class="generic-grid">

${Object.entries(data.application_fee).map(([k,v])=>
`<div class="grid-card"><label>${k}</label><span>${v}</span></div>`
).join('')}

</div>
`;

content.appendChild(sec);

}

/* GENERIC SECTIONS */

const skip=[
'overview',
'important_dates',
'application_fee',
'important_links',
'vacancy_details'
];

Object.entries(data).forEach(([key,value])=>{

if(skip.includes(key)) return;

const sec=document.createElement('div');
sec.className='section-box';

const title=key.replace(/_/g,' ').toUpperCase();

let html=`<div class="section-title">${title}</div>`;

if(Array.isArray(value)){

html+=`<ul>${value.map(v=>`<li>${v}</li>`).join('')}</ul>`;

}

else if(typeof value==='object'){

html+=`

<div class="generic-grid">

${Object.entries(value).map(([k,v])=>
`<div class="grid-card"><label>${k}</label><span>${v}</span></div>`
).join('')}

</div>

`;

}

sec.innerHTML=html;
content.appendChild(sec);

});

/* VACANCY TABLE */

if(data.vacancy_details){

content.insertAdjacentHTML(
'beforeend',
renderTable(data.vacancy_details,"Vacancy Details")
);

}

/* QUICK ACTIONS */

renderQuickActions(jobId,data);

}

/* =============================
   EVENTS LIFECYCLE ENGINE
============================= */

async function renderQuickActions(jobId,data){

try{

const res=await fetch('data/events.json');
const eventsJSON=await res.json();

const events=(eventsJSON.data||[]).filter(e=>e.id===jobId);

if(events.length===0) return;

const sec=document.createElement('div');
sec.className='section-box';

let html=`

<div class="section-title">
<i class="fas fa-link"></i> Quick Actions
</div>

<div class="link-grid">
`;

events.forEach(ev=>{

let label=ev.title || ev.type;
let url=ev.url || "";

let status="";
let btnClass="btn";

if(url){

btnClass+=" btn-action-active";

}else{

btnClass+=" btn-inactive";

switch(ev.type){

case "apply":
status=" (Coming Soon)";
break;

case "admitcard":
status=" (Coming Soon)";
break;

case "answerkey":
status=" (Awaited)";
break;

case "result":
status=" (Awaited)";
break;

}

}

html+=`
<a href="${url||'#'}" class="${btnClass}" target="_blank">
${label}${status}
</a>
`;

});

/* OFFICIAL WEBSITE FROM JOBDATA */

if(data?.important_links?.links?.["Official Website"]){

html+=`
<a href="${data.important_links.links["Official Website"]}"
class="btn btn-action-active"
target="_blank">
Official Website
</a>
`;

}

html+=`</div>`;

sec.innerHTML=html;
document.getElementById('main-content').appendChild(sec);

}catch(e){

console.error("Events load error",e);

}

}

/* =============================
   TABLE RENDERER
============================= */

function renderTable(data,title){

const tableData=data.table || data.rows || data;

if(!Array.isArray(tableData)) return "";

const headers=Object.keys(tableData[0]);

return`

<div class="section-box">

<div class="section-title">
<i class="fas fa-users"></i> ${title}
</div>

<div class="table-wrapper">

<table>

<thead>
<tr>${headers.map(h=>`<th>${h}</th>`).join('')}</tr>
</thead>

<tbody>

${tableData.map(row=>
`<tr>${headers.map(h=>`<td>${row[h]}</td>`).join('')}</tr>`
).join('')}

</tbody>

</table>

</div>

</div>

`;

}

/* =============================
   FALLBACK
============================= */

function loadFallback(id){

document.getElementById('loader').innerHTML=
`<p style="color:red;">Job not found</p>`;

}

</script></body>
</html>
